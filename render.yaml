services:
  - type: web
    name: todowall-api
    plan: free
    env: docker
    dockerfilePath: todowall-api/Dockerfile
    dockerContext: todowall-api
    healthCheckPath: /up
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite