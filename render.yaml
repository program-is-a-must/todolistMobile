services:
  - type: web
    name: todowall-api
    rootDir: todowall-api
    plan: free
    env: node
    buildCommand: ./render-build.sh
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    healthCheckPath: /up
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
